:root {
    --navy: #06172d;
    --blue: #0b4fbd;
    --bright-blue: #2d8cff;
    --sky: #d9ecff;
    --ice: #f4f9ff;
    --white: #ffffff;
    --text: #132238;
    --muted: #5e718c;
    --line: #d5e6f8;
    --shadow: 0 22px 55px rgba(9, 37, 73, 0.16);
    --soft-shadow: 0 12px 28px rgba(9, 37, 73, 0.10);
    --radius: 24px;
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(45, 140, 255, 0.24), transparent 26%),
        radial-gradient(circle at bottom right, rgba(11, 79, 189, 0.16), transparent 30%),
        linear-gradient(135deg, #eef6ff 0%, #ffffff 48%, #e7f2ff 100%);
    line-height: 1.65;
}

#wrapper {
    width: 90%;
    max-width: 1200px;
    min-width: 960px;
    margin: 34px auto;
    background-color: rgba(255, 255, 255, 0.97);
    border: 1px solid rgba(213, 230, 248, 0.95);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: var(--shadow);
}

header {
    background:
        linear-gradient(135deg, rgba(6, 23, 45, 0.99), rgba(11, 79, 189, 0.96)),
        url("assets/header-pattern.svg");
    color: var(--white);
    padding: 30px 48px;
}

.logo-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
}

.brand h1 {
    margin: 0;
    font-size: 2.2em;
    letter-spacing: 0.4px;
}

.brand p {
    margin: 6px 0 0;
    color: #dbeaff;
}

.badge,
.small-pill {
    display: inline-block;
    padding: 9px 14px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background-color: rgba(255, 255, 255, 0.13);
    color: var(--white);
    border-radius: 999px;
    font-size: 0.9em;
    white-space: nowrap;
}

.small-pill {
    background-color: var(--ice);
    color: var(--blue);
    border-color: var(--line);
}

nav {
    background: rgba(244, 249, 255, 0.96);
    padding: 15px 48px;
    border-bottom: 1px solid var(--line);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
}

nav a {
    color: var(--navy);
    text-decoration: none;
    font-weight: bold;
    margin: 0 8px;
    padding: 9px 15px;
    border-radius: 999px;
    transition: 0.2s ease;
}

nav a:hover,
nav a.active {
    color: var(--white);
    background-color: var(--blue);
}

.hero {
    display: grid;
    grid-template-columns: 1.35fr 0.65fr;
    gap: 36px;
    align-items: center;
    min-height: 390px;
    padding: 68px 54px;
    color: var(--white);
    background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.24), transparent 24%),
        radial-gradient(circle at 92% 10%, rgba(255, 255, 255, 0.16), transparent 22%),
        linear-gradient(130deg, #06172d 0%, #0b4fbd 58%, #2d8cff 100%);
}

.hero h2 {
    font-size: 2.8em;
    line-height: 1.1;
    margin: 0 0 16px;
    max-width: 760px;
}

.hero p {
    max-width: 760px;
    color: #eaf4ff;
    font-size: 1.09em;
}

.hero-actions { margin-top: 28px; }

.button-link {
    display: inline-block;
    margin-right: 12px;
    margin-bottom: 10px;
    padding: 12px 19px;
    border-radius: 999px;
    background-color: var(--white);
    color: var(--blue);
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.button-link.secondary {
    background-color: rgba(255, 255, 255, 0.15);
    color: var(--white);
    border: 1px solid rgba(255, 255, 255, 0.35);
}

.profile-card {
    background-color: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.30);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.16);
}

.initials {
    width: 78px;
    height: 78px;
    display: grid;
    place-items: center;
    border-radius: 24px;
    background-color: var(--white);
    color: var(--blue);
    font-size: 1.85em;
    font-weight: bold;
    margin-bottom: 16px;
}

.profile-card p {
    margin: 8px 0;
    color: #eef6ff;
}

main { padding: 46px 54px; }

section { margin-bottom: 42px; }

.eyebrow {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--blue);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    font-size: 0.78em;
}

.eyebrow.light { color: #dbeaff; }

h2 {
    color: var(--navy);
    margin-top: 0;
    margin-bottom: 12px;
    font-size: 1.9em;
    line-height: 1.2;
}

h3 {
    color: var(--navy);
    margin-top: 0;
}

p { margin-top: 0; }

a { color: var(--blue); }

.intro-panel,
.split,
.contact-split,
.section-topper {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 26px;
    align-items: start;
}

.section-topper {
    grid-template-columns: 1fr auto;
    align-items: center;
}

.mini-note {
    background: linear-gradient(135deg, var(--ice), #ffffff);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--soft-shadow);
}

.card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
}

.card,
.highlight,
.video-box,
form {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background-color: var(--white);
    box-shadow: var(--soft-shadow);
}

.card {
    padding: 25px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 36px rgba(9, 37, 73, 0.15);
}

.feature-card {
    background: linear-gradient(135deg, #ffffff, var(--ice));
}

.icon-circle {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--sky), var(--white));
    color: var(--blue);
    font-weight: bold;
    margin-bottom: 14px;
}

.highlight {
    background: linear-gradient(135deg, rgba(244, 249, 255, 0.96), rgba(217, 236, 255, 0.82));
    border-left: 7px solid var(--blue);
    padding: 25px 27px;
}

.page-heading {
    max-width: 850px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
}

.timeline {
    border-left: 4px solid var(--sky);
}

.timeline-item {
    position: relative;
    margin-bottom: 24px;
    padding-left: 18px;
}

.timeline-item::before {
    content: "";
    position: absolute;
    left: -34px;
    top: 5px;
    width: 15px;
    height: 15px;
    background-color: var(--blue);
    border: 4px solid var(--sky);
    border-radius: 50%;
}

.skill-wall {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.skill-wall span {
    padding: 11px 15px;
    border-radius: 999px;
    background-color: var(--ice);
    border: 1px solid var(--line);
    color: var(--navy);
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 18px;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: var(--soft-shadow);
}

th {
    background-color: var(--navy);
    color: var(--white);
    text-align: left;
}

th, td {
    padding: 13px;
    border: 1px solid var(--line);
}

tr:nth-child(even) { background-color: var(--ice); }

.video-box {
    padding: 28px;
    background: linear-gradient(135deg, #ffffff, var(--ice));
}

video {
    width: 100%;
    max-width: 820px;
    border-radius: 18px;
    display: block;
    margin-top: 18px;
    border: 1px solid var(--line);
    box-shadow: var(--soft-shadow);
    background-color: var(--navy);
}

.source-note {
    margin-top: 14px;
    color: var(--muted);
    font-size: 0.94em;
}

form {
    max-width: 760px;
    padding: 26px;
    background: linear-gradient(135deg, #ffffff, var(--ice));
}

label {
    display: block;
    font-weight: bold;
    margin-top: 15px;
}

input,
select,
textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 1px solid #aac6eb;
    border-radius: 10px;
    font-size: 1em;
    font-family: Arial, Helvetica, sans-serif;
}

input:focus,
select:focus,
textarea:focus {
    outline: 3px solid rgba(45, 140, 255, 0.22);
    border-color: var(--bright-blue);
}

button {
    margin-top: 20px;
    background-color: var(--blue);
    color: var(--white);
    padding: 13px 25px;
    border: none;
    border-radius: 999px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 9px 20px rgba(11, 79, 189, 0.22);
}

button:hover { background-color: var(--bright-blue); }

.contact-card {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: var(--white);
}

.contact-card h3 { color: var(--white); }
.contact-card a { color: #dbeaff; }

footer {
    text-align: center;
    padding: 24px;
    background-color: var(--navy);
    color: var(--white);
    font-size: 0.94em;
}

footer a { color: #cce3ff; }

@media (max-width: 980px) {
    #wrapper {
        width: 100%;
        min-width: 0;
        margin: 0;
        border-radius: 0;
    }

    .logo-line,
    .hero,
    .intro-panel,
    .split,
    .contact-split,
    .section-topper {
        grid-template-columns: 1fr;
    }

    nav a {
        display: inline-block;
        margin: 6px;
    }

    .card-grid {
        grid-template-columns: 1fr;
    }

    main,
    .hero,
    header,
    nav {
        padding-left: 24px;
        padding-right: 24px;
    }

    .hero h2 { font-size: 2.15em; }
}
